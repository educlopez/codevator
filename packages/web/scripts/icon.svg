<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b7260"/>
      <stop offset="50%" stop-color="#565c4c"/>
      <stop offset="100%" stop-color="#4a5040"/>
    </linearGradient>
    <!-- Subtle noise-like texture via filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="identity"/>
      </feComponentTransfer>
    </filter>
    <!-- Highlight reflection -->
    <linearGradient id="highlight" x1="0.3" y1="0" x2="0.7" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circle background with gradient -->
  <g clip-path="url(#circleClip)">
    <circle cx="256" cy="256" r="256" fill="url(#door)"/>
    <!-- Subtle texture -->
    <circle cx="256" cy="256" r="256" fill="url(#door)" filter="url(#noise)" opacity="0.3"/>
    <!-- Metallic highlight -->
    <circle cx="256" cy="256" r="256" fill="url(#highlight)"/>
  </g>

  <!-- Letter C in serif font -->
  <text
    x="256"
    y="276"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Instrument Serif', 'Georgia', 'Times New Roman', serif"
    font-size="340"
    font-weight="400"
    fill="white"
    opacity="0.95"
    letter-spacing="-10"
  >C</text>
</svg>
